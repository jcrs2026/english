<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>初中单词背诵</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background-color: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 95%; max-width: 800px; text-align: center; }
        h1 { color: #333; margin-bottom: 20px; }
        .btn { background-color: #4CAF50; color: white; padding: 12px 24px; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; margin: 10px; transition: background 0.3s; }
        .btn:hover { background-color: #45a049; }
        .btn-outline { background-color: transparent; border: 2px solid #4CAF50; color: #4CAF50; }
        .btn-outline:hover { background-color: #4CAF50; color: white; }
        .btn-outline.selected { background-color: #4CAF50; color: white; }
        .btn-blue { background-color: #3498db; }
        .btn-blue:hover { background-color: #2980b9; }
        .word-display { font-size: 32px; font-weight: bold; color: #2c3e50; margin: 20px 0; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .option-btn { background-color: #2f80ed; color: #ffffff; padding: 16px 18px; border: 1px solid rgba(255,255,255,0.24); border-radius: 12px; cursor: pointer; font-size: 16px; font-weight: 600; letter-spacing: 0.02em; box-shadow: 0 10px 25px rgba(47, 128, 237, 0.12); transition: transform 0.18s ease, background 0.18s ease, box-shadow 0.18s ease; }
        .option-btn:hover:not(:disabled) { background-color: #1f6fe0; transform: translateY(-2px); box-shadow: 0 14px 28px rgba(47, 128, 237, 0.18); }
        .option-btn:disabled { opacity: 0.7; cursor: default; }
        .option-btn.correct { background-color: #2ecc71 !important; }
        .option-btn.wrong { background-color: #e74c3c !important; }
        .progress { margin-top: 20px; color: #7f8c8d; font-size: 14px; }
        #answer-list { margin-top: 20px; }
        .answer-item { display: grid; grid-template-columns: 1fr auto; gap: 10px; align-items: center; padding: 12px 14px; border-radius: 10px; margin-bottom: 10px; background-color: #f8f9fa; }
        .answer-item.correct { border-left: 4px solid #2ecc71; }
        .answer-item.wrong { border-left: 4px solid #e74c3c; }
        .answer-item .answer-info { text-align: left; line-height: 1.2; white-space: normal; overflow: visible; text-overflow: clip; }
        .answer-item .answer-status { font-weight: bold; font-size: 14px; white-space: nowrap; }
        .answer-item .answer-status.correct { color: #2ecc71; }
        .answer-item .answer-status.wrong { color: #e74c3c; }
        .answer-item .selected-text { color: #555; font-size: 13px; }
        .hidden { display: none; }
        .timer-display {
            font-size: 18px;
            color: #e67e22; /* 橙色，醒目 */
            font-weight: bold;
            margin-bottom: 10px;
            background-color: #fdf2e9;
            padding: 5px 15px;
            border-radius: 20px;
            display: inline-block;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- 首页：选择年级 -->
    <div id="start-screen">
        <h1>📚 初中单词背诵</h1>
        <p>请选择词库开始练习</p>

        <button class="btn btn-blue" onclick="loadGrade8()">📘 八年级单词</button>
        <button class="btn btn-blue" onclick="loadGrade9()">📙 九年级单词</button>
        <button class="btn btn-blue" onclick="loadGrade10()">📗 收集的单词</button>
        <button class="btn btn-blue" onclick="loadGrade11()">📕 高频的单词</button>

        <button class="btn btn-blue" onclick="location.href='shulihua.html'">📘 数理化基本</button>
        <button class="btn btn-blue" onclick="location.href='daofalishi.html'">📘 道法历史</button>

        <div id="quiz-setting" class="hidden">
            <p style="margin-top: 20px;">请选择题型、抽题方式与本轮背诵数量：</p>
            <div style="display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; margin-bottom: 12px;">
                <button class="btn btn-outline" id="mode-en2zh" onclick="setQuizMode('en2zh')">【英】选【中】</button>
                <button class="btn btn-outline" id="mode-zh2en" onclick="setQuizMode('zh2en')">【中】选【英】</button>
            </div>
            <div style="display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; margin-bottom: 12px;">
                <button class="btn btn-outline" id="select-random" onclick="setSelectionMode('random')">随机抽题</button>
                <button class="btn btn-outline" id="select-sequence" onclick="setSelectionMode('sequence')">顺序抽题</button>
            </div>
            <div id="sequence-start" class="hidden" style="margin-bottom: 12px;">
                <label>从第 <input type="number" id="start-index-input" value="1" min="1" style="width: 80px; padding: 4px 8px; margin: 0 4px;" onchange="updateSequenceStart(this.value)"> 项开始</label>
            </div>
            <button class="btn btn-outline" onclick="startQuiz(50)">50 个</button>
            <button class="btn btn-outline" onclick="startQuiz(100)">100 个</button>
            <button class="btn btn-outline" onclick="startQuiz(150)">150 个</button>
        </div>
    </div>

    <!-- 答题页面 -->
    <div id="quiz-screen" class="hidden">
        <!-- 【新增】计时器显示 -->
        <div class="timer-display">⏱️ 耗时: <span id="time-elapsed">00:00</span></div>

        <div class="progress">进度: <span id="current-count">0</span> / <span id="total-count">0</span></div>
        <div class="word-display" id="question-word">Word</div>
        <div class="options-grid" id="options-container"></div>
        <div id="feedback" style="margin-top: 15px; height: 20px; font-weight: bold;"></div>
        <div style="margin-top: 20px; display: flex; justify-content: center; gap: 12px; flex-wrap: wrap;">
            <button class="btn btn-outline" id="prev-btn" onclick="goPrevious()" disabled>上一题</button>
            <button class="btn btn-outline" id="next-btn" onclick="goNext()" disabled>下一题</button>
        </div>
    </div>

    <!-- 结果页面 -->
    <div id="result-screen" class="hidden">
        <h1>🎉 本轮测试完成！</h1>
        <p>答对: <span id="correct-count" style="color: #2ecc71; font-weight: bold;"></span> | 答错: <span id="wrong-count" style="color: #e74c3c; font-weight: bold;"></span></p>
        <div id="answer-list" style="margin-top: 20px; text-align: left;"></div>
        <button class="btn" onclick="location.reload()">🔄 返回首页重新选择</button>
    </div>
</div>

<script src="english.js"></script>

<script>
    // 全局变量
    let fullWordList = [];
    let currentQuizList = [];
    let currentIndex = 0;
    let correctAnswers = 0;
    let wrongAnswers = 0;
    let isAnswering = false;
    let quizLimit = 30;
    let quizMode = 'en2zh';
    let selectionMode = 'random';
    let sequenceStart = 1;
    
    // 【新增】计时相关变量
    let timerInterval = null;
    let startTime = 0;
    let elapsedTime = 0; // 单位：秒

    // 【新增】格式化时间为 MM:SS
    function formatTime(seconds) {
        const m = Math.floor(seconds / 60);
        const s = seconds % 60;
        return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    }

    // 【新增】启动计时器
    function startTimer() {
        clearInterval(timerInterval); // 清除可能存在的旧计时器
        startTime = Date.now();
        elapsedTime = 0;
        document.getElementById('time-elapsed').innerText = "00:00";
        
        timerInterval = setInterval(() => {
            const now = Date.now();
            elapsedTime = Math.floor((now - startTime) / 1000);
            document.getElementById('time-elapsed').innerText = formatTime(elapsedTime);
        }, 1000);
    }

    // 【新增】停止计时器
    function stopTimer() {
        clearInterval(timerInterval);
    }

    // 加载年级单词
    function loadGrade8() {
        fullWordList = grade8Words.map(w => ({ ...w, errors: 0 }));
        document.getElementById('quiz-setting').classList.remove('hidden');
        setQuizMode('en2zh');
        setSelectionMode('random');
    }

    function loadGrade9() {
        fullWordList = grade9Words.map(w => ({ ...w, errors: 0 }));
        document.getElementById('quiz-setting').classList.remove('hidden');
        setQuizMode('en2zh');
        setSelectionMode('random');
    }

    function loadGrade10() {
        fullWordList = grade10Words.map(w => ({ ...w, errors: 0 }));
        document.getElementById('quiz-setting').classList.remove('hidden');
        setQuizMode('en2zh');
        setSelectionMode('random');
    }

    function loadGrade11() {
        fullWordList = grade11Words.map(w => ({ ...w, errors: 0 }));
        document.getElementById('quiz-setting').classList.remove('hidden');
        setQuizMode('en2zh');
        setSelectionMode('random');
    }

    // 开始测试
    function startQuiz(limit) {
        quizLimit = limit;
        const count = Math.min(quizLimit, fullWordList.length);
        currentQuizList = [];

        if (selectionMode === 'sequence') {
            const startIndex = Math.max(0, Math.min(sequenceStart - 1, fullWordList.length - 1));
            for (let i = 0; i < count; i++) {
                const index = (startIndex + i) % fullWordList.length;
                currentQuizList.push({ ...fullWordList[index], selectedWord: null, status: null });
            }
        } else {
            let weightedList = [];
            fullWordList.forEach(item => {
                const weight = 1 + (item.errors * 2);
                for (let i = 0; i < weight; i++) weightedList.push(item);
            });
            const selectedIndices = new Set();
            while (currentQuizList.length < count) {
                const randomIdx = Math.floor(Math.random() * weightedList.length);
                const selected = weightedList[randomIdx];
                const idx = fullWordList.indexOf(selected);
                if (!selectedIndices.has(idx)) {
                    selectedIndices.add(idx);
                    currentQuizList.push({ ...selected, selectedWord: null, status: null });
                }
            }
        }

        currentIndex = correctAnswers = wrongAnswers = 0;
        
        // 【新增】启动计时器
        startTimer();

        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        document.getElementById('total-count').innerText = count;
        showQuestion();
    }

    function setQuizMode(mode) {
        quizMode = mode;
        document.getElementById('mode-en2zh').classList.toggle('selected', mode === 'en2zh');
        document.getElementById('mode-zh2en').classList.toggle('selected', mode === 'zh2en');
    }

    function setSelectionMode(mode) {
        selectionMode = mode;
        document.getElementById('select-random').classList.toggle('selected', mode === 'random');
        document.getElementById('select-sequence').classList.toggle('selected', mode === 'sequence');
        document.getElementById('sequence-start').classList.toggle('hidden', mode !== 'sequence');
    }

    function updateSequenceStart(value) {
        const num = parseInt(value);
        sequenceStart = isNaN(num) || num < 1 ? 1 : Math.min(num, fullWordList.length);
        document.getElementById('start-index-input').value = sequenceStart;
    }

    // 显示题目
    function showQuestion() {
        if (currentIndex >= currentQuizList.length) { showResult(); return; }
        const w = currentQuizList[currentIndex];
        const answered = w.status !== null;
        isAnswering = answered;
        document.getElementById('current-count').innerText = currentIndex + 1;
        document.getElementById('question-word').innerText = quizMode === 'en2zh'
            ? `${w.word} ${w.pos || ''}`
            : `${w.meaning} ${w.pos || ''}`;

        const fb = document.getElementById('feedback');
        if (answered) {
            fb.innerText = w.status === 'correct' ? '已回答：正确 ✅' : `已回答：错误 ❌ 正确：${quizMode === 'en2zh' ? w.meaning : w.word}`;
            fb.style.color = w.status === 'correct' ? '#2ecc71' : '#e74c3c';
        } else {
            fb.innerText = '';
        }

        // --- 修改开始：智能筛选同词性干扰项 ---
        let options = [w];
        
        // 仅在“英选中的模式”下尝试匹配词性
        if (quizMode === 'en2zh') {
            const currentPos = (w.pos || '').trim().toLowerCase();
            
            // 1. 筛选同词性的单词池 (排除当前单词)
            let samePosPool = fullWordList.filter(x => 
                x.word !== w.word && 
                (x.pos || '').trim().toLowerCase() === currentPos
            );

            // 2. 如果同词性单词不足5个，则混合其他单词
            let others = [];
            if (samePosPool.length >= 5) {
                // 足够则只从同词性中随机取5个
                others = samePosPool.sort(() => Math.random() - 0.5).slice(0, 5);
            } else {
                // 不足则全部取用同词性的，剩下的从其他单词中补全
                others = [...samePosPool];
                const otherPool = fullWordList.filter(x => 
                    x.word !== w.word && 
                    (x.pos || '').trim().toLowerCase() !== currentPos
                );
                const needed = 5 - others.length;
                others = [...others, ...otherPool.sort(() => Math.random() - 0.5).slice(0, needed)];
            }
            
            options = [...options, ...others].sort(() => Math.random() - 0.5);
        } else {
            // “中选英”模式保持原有逻辑（通常中文释义很难严格对应词性过滤，或者需求未提及）
            const others = fullWordList.filter(x => x.word !== w.word).sort(() => Math.random() - 0.5).slice(0, 5);
            options = [...options, ...others].sort(() => Math.random() - 0.5);
        }
        // --- 修改结束 ---

        const box = document.getElementById('options-container');
        box.innerHTML = '';
        options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = quizMode === 'en2zh' ? opt.meaning : opt.word;
            //btn.disabled = answered;
            btn.onclick = () => checkAnswer(opt, w, btn);
            if (answered) {
                if (opt.word === w.word) btn.classList.add('correct');
                if (opt.word === w.selectedWord && w.status === 'wrong') btn.classList.add('wrong');
            }
            box.appendChild(btn);
        });
        updateNavButtons();
    }

    // 检查答案
    function checkAnswer(selected, correct, btn) {
        if (isAnswering) return;
        isAnswering = true;
        correct.selectedWord = selected.word;
        correct.selectedText = quizMode === 'en2zh' ? selected.meaning : selected.word;
        const ok = selected.word === correct.word;
        correct.status = ok ? 'correct' : 'wrong';
        const all = document.querySelectorAll('.option-btn');

        if (ok) {
            btn.classList.add('correct');
            document.getElementById('feedback').innerText = '回答正确！✅ 👍';
            document.getElementById('feedback').style.color = '#2ecc71';
            correctAnswers++;
        } else {
            btn.classList.add('wrong');
            document.getElementById('feedback').innerText = `回答错误！❌`;
            document.getElementById('feedback').style.color = '#e74c3c';
            wrongAnswers++;
            const ansText = quizMode === 'en2zh' ? correct.meaning : correct.word;
            all.forEach(b => { if (b.innerText === ansText) b.classList.add('correct'); });
            const target = fullWordList.find(x => x.word === correct.word);
            if (target) target.errors++;
        }
        //all.forEach(b => b.disabled = true);
        updateNavButtons();
    }

    function updateNavButtons() {
        const prev = document.getElementById('prev-btn');
        const next = document.getElementById('next-btn');
        const w = currentQuizList[currentIndex];
        prev.disabled = currentIndex === 0;
        next.disabled = !w || w.status === null;
        next.innerText = currentIndex === currentQuizList.length - 1 ? '完成' : '下一题';
    }

    function goPrevious() { if (currentIndex > 0) { currentIndex--; showQuestion(); } }
    function goNext() {
        const w = currentQuizList[currentIndex];
        if (!w || w.status === null) return;
        if (currentIndex === currentQuizList.length - 1) { showResult(); return; }
        currentIndex++; showQuestion();
    }

    // 结果
    function showResult() {
        // 【新增】停止计时器
        stopTimer();

        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('correct-count').innerText = correctAnswers;
        document.getElementById('wrong-count').innerText = wrongAnswers;
        
        // 【新增】显示总耗时
        const timeStats = document.createElement('p');
        timeStats.style.fontSize = '18px';
        timeStats.style.marginTop = '10px';
        timeStats.style.color = '#333';
        timeStats.innerHTML = `⏱️ 总耗时: <strong style="color: #e67e22;">${formatTime(elapsedTime)}</strong> (平均每题: ${(elapsedTime / (correctAnswers + wrongAnswers)).toFixed(1)}秒)`;
        
        // 插入到答对答错统计后面
        const resultScreen = document.getElementById('result-screen');
        const firstP = resultScreen.querySelector('p');
        resultScreen.insertBefore(timeStats, firstP.nextSibling);

        const list = document.getElementById('answer-list');
        list.innerHTML = '';
        const wrongs = currentQuizList.filter(x => x.status === 'wrong');
        wrongs.forEach((item, i) => {
            const div = document.createElement('div');
            div.className = 'answer-item wrong';
            const ans = quizMode === 'en2zh' ? item.meaning : item.word;
            //const sel = item.selectedText ? ` | 你的答案：${item.selectedText}` : '';
            const sel = '';
            const qtext = quizMode === 'en2zh' ? `${item.word} ${item.pos || ''}` : `${item.meaning} ${item.pos || ''}`;
            div.innerHTML = `<div class="answer-info"><strong>${i+1}. ${qtext}</strong> 正确答案：${ans}${sel}</div><div class="answer-status wrong">错误</div>`;
            list.appendChild(div);
        });
    }
</script>
</body>
</html>
